<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — VideoDemo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); width: 100%; max-width: 400px; text-align: center; }
    h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
    button { padding: .625rem 1.5rem; background: #4f46e5; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="greeting">Loading…</h1>
    <button id="logout-btn">Log out</button>
  </div>
  <script>
    const greetingEl = document.getElementById('greeting');
    const logoutBtn = document.getElementById('logout-btn');

    function logout() {
      sessionStorage.clear();
      window.location.href = 'login.html';
    }

    async function init() {
      const token = sessionStorage.getItem('token');
      if (!token) { logout(); return; }

      try {
        const res = await fetch('/api/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        if (!res.ok) { logout(); return; }

        const data = await res.json();
        greetingEl.textContent = 'Welcome, ' + data.username + '!';
      } catch {
        logout();
      }
    }

    logoutBtn.addEventListener('click', logout);
    init();
  </script>
</body>
</html>
