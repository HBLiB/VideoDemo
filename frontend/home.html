<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — VideoDemo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="card" style="text-align:center;">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="8" fill="url(#lg)"/>
        <path d="M14 11v14l12-7-12-7z" fill="#fff"/>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="36" y2="36"><stop stop-color="#4f46e5"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
      </svg>
      <span class="logo-text">VideoDemo</span>
    </div>
    <h1><span class="typewriter" id="greeting"></span></h1>
    <button id="logout-btn">Log out</button>
  </div>
  <div class="footer">VideoDemo &copy; 2026</div>
  <script>
    const greetingEl = document.getElementById('greeting');
    const logoutBtn = document.getElementById('logout-btn');

    function logout() {
      sessionStorage.clear();
      window.location.href = 'login.html';
    }

    function typewrite(el, text, speed) {
      let i = 0;
      el.textContent = '';
      function tick() {
        if (i < text.length) {
          el.textContent += text.charAt(i);
          i++;
          setTimeout(tick, speed);
        } else {
          el.classList.add('done');
        }
      }
      tick();
    }

    async function init() {
      const token = sessionStorage.getItem('token');
      if (!token) { logout(); return; }

      try {
        const res = await fetch('/api/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        if (!res.ok) { logout(); return; }

        const data = await res.json();
        typewrite(greetingEl, 'Welcome, ' + data.username + '!', 50);
      } catch {
        logout();
      }
    }

    logoutBtn.addEventListener('click', logout);
    init();
  </script>
</body>
</html>
